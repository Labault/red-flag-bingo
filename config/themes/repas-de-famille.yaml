  - text: "Mamie sort un fusil de chasse pour menacer le voisin"
    rarity: legendary
  - text: "Mamie tire sur la pelouse \"juste pour faire peur\""
    rarity: legendary
  - text: "Un voisin appelle la gendarmerie, mamie passe la nuit en cellule"
    rarity: legendary
  - text: "On fait quand même le café avant d'aller la chercher"
    rarity: legendary
  - text: "Une dispute déclenche la révélation que tata a couché avec le mari de tata 2"
    rarity: legendary
  - text: "Tata 2 retourne la table, littéralement"
    rarity: legendary
  - text: "Le rôti finit accroché au lustre"
    rarity: legendary
  - text: "On en parle encore 22 ans après comme du \"repas du lustre\""
    rarity: legendary
  - text: "Le voisin frappe à la porte parce que \"votre dispute s'entend jusqu'à la rue\""
    rarity: legendary
  - text: "On invite le voisin à finir le repas"
    rarity: legendary
  - text: "Le voisin reste pour Noël prochain et le suivant"
    rarity: legendary
  - text: "Tonton avoue qu'il n'est pas le père biologique de son fils"
    rarity: legendary
  - text: "Le fils a 47 ans, il l'apprend à ce repas"
    rarity: legendary
  - text: "Une mortelle alerte au gaz vide la maison entre la poire et le fromage"
    rarity: legendary
  - text: "On finit le repas dans le jardin, en plein janvier, en doudoune"
    rarity: legendary
  - text: "Quelqu'un manque s'étouffer avec une arête, manœuvre de Heimlich réussie par mamie"
    rarity: legendary
  - text: "Mamie devient une héroïne, on en parle à chaque repas pendant 10 ans"
    rarity: legendary
  - text: "Un cambriolage a lieu pendant le repas, on l'apprend au dessert"
    rarity: legendary
  - text: "Les voleurs ont laissé un mot \"merci pour la dinde dans le frigo\""
    rarity: legendary

theme:
  name: "Réunion de travail"
  slug: "reunion-de-travail"
  description: "Tous les red flags qu'on rencontre en réunion, du micro coupé au manager qui découvre le sujet en direct. Si tu coches plus de 5 cases, c'est que tu as une réunion là maintenant."
  emoji: "📅"

red_flags:

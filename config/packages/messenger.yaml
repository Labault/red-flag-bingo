framework:
    messenger:
        failure_transport: failed

        transports:
            failed: 'doctrine://default?queue_name=failed'

        # Pas de routing manuel : c'est le scheduler qui dispatche les messages
        # vers son propre transport "scheduler_default" automatiquement.
        routing: []

when@test:
    framework:
        messenger:
            transports:
                failed: 'in-memory://'
